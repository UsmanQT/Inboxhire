<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inboxhire</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
    }

    header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    header span { font-size: 13px; color: #aaa; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .hamburger {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 4px;
    }

    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: white;
      border-radius: 2px;
      transition: all 0.2s;
    }

    .stats-panel {
      display: none;
      position: absolute;
      top: 64px;
      right: 40px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      z-index: 100;
      padding: 20px;
      min-width: 260px;
    }

    .stats-panel.open { display: block; }

    .stats-panel h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin-bottom: 16px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .stat-row:last-child { border-bottom: none; }

    .stat-row .label {
      font-size: 14px;
      color: #555;
    }

    .stat-row .number {
      font-size: 20px;
      font-weight: 700;
    }

    .stat-row.applied .number { color: #3b82f6; }
    .stat-row.interviewing .number { color: #f59e0b; }
    .stat-row.offer .number { color: #10b981; }
    .stat-row.rejected .number { color: #ef4444; }

    .table-container {
      margin: 24px 40px 40px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      overflow: hidden;
    }

    .table-header {
      padding: 16px 24px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .table-header h2 { font-size: 15px; font-weight: 600; }

    table { width: 100%; border-collapse: collapse; }

    th {
      text-align: left;
      padding: 12px 20px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      border-bottom: 1px solid #f0f0f0;
      background: #fafafa;
    }

    td {
      padding: 14px 20px;
      font-size: 14px;
      border-bottom: 1px solid #f9f9f9;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }

    .company { font-weight: 600; }
    .job-title { color: #555; }
    .date { color: #999; font-size: 13px; }

    select.status-select {
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid #e0e0e0;
      cursor: pointer;
      background: white;
    }

    .empty {
      text-align: center;
      padding: 60px;
      color: #aaa;
      font-size: 14px;
    }

    .refresh-btn {
      background: #1a1a2e;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    .refresh-btn:hover { background: #2d2d4e; }
  </style>
</head>
<body>

<header>
  <h1>Inboxhire</h1>
  <div class="header-right">
    <span id="last-updated"></span>
    <button class="hamburger" onclick="toggleStats()">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <div class="stats-panel" id="stats-panel">
    <h3>Overview</h3>
    <div class="stat-row applied">
      <span class="label">Applied</span>
      <span class="number" id="count-applied">0</span>
    </div>
    <div class="stat-row interviewing">
      <span class="label">Interviewing</span>
      <span class="number" id="count-interviewing">0</span>
    </div>
    <div class="stat-row offer">
      <span class="label">Offers</span>
      <span class="number" id="count-offer">0</span>
    </div>
    <div class="stat-row rejected">
      <span class="label">Rejected</span>
      <span class="number" id="count-rejected">0</span>
    </div>
  </div>
</header>

<div class="table-container">
  <div class="table-header">
    <h2>Applications</h2>
    <button class="refresh-btn" onclick="loadApplications()">↻ Refresh</button>
  </div>
  <table>
    <thead>
      <tr>
        <th>Company</th>
        <th>Job Title</th>
        <th>Status</th>
        <th>Date Applied</th>
      </tr>
    </thead>
    <tbody id="applications-body">
      <tr><td colspan="4" class="empty">Loading...</td></tr>
    </tbody>
  </table>
</div>

<script>
  const API = '/api';

  function toggleStats() {
    document.getElementById('stats-panel').classList.toggle('open');
  }

  document.addEventListener('click', function(e) {
    if (!e.target.closest('.hamburger') && !e.target.closest('.stats-panel')) {
      document.getElementById('stats-panel').classList.remove('open');
    }
  });

  function formatDate(dateStr) {
    try {
      return new Date(dateStr).toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric'
      });
    } catch {
      return dateStr;
    }
  }

  async function updateStatus(id, status) {
    await fetch(`${API}/applications/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    loadApplications();
  }

  async function loadApplications() {
    const res = await fetch(`${API}/applications`);
    const apps = await res.json();

    const counts = { applied: 0, interviewing: 0, offer: 0, rejected: 0 };
    apps.forEach(a => { if (counts[a.status] !== undefined) counts[a.status]++; });
    document.getElementById('count-applied').textContent = counts.applied;
    document.getElementById('count-interviewing').textContent = counts.interviewing;
    document.getElementById('count-offer').textContent = counts.offer;
    document.getElementById('count-rejected').textContent = counts.rejected;

    document.getElementById('last-updated').textContent =
      'Last updated: ' + new Date().toLocaleTimeString();

    const tbody = document.getElementById('applications-body');

    if (apps.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty">No applications yet. Run the Gmail Poller to fetch your emails.</td></tr>';
      return;
    }

    tbody.innerHTML = apps.map(app => `
      <tr>
        <td class="company">${app.company || '—'}</td>
        <td class="job-title">${app.job_title || '—'}</td>
        <td>
          <select class="status-select" onchange="updateStatus(${app.id}, this.value)">
            <option value="applied"      ${app.status === 'applied'      ? 'selected' : ''}>Applied</option>
            <option value="interviewing" ${app.status === 'interviewing' ? 'selected' : ''}>Interviewing</option>
            <option value="offer"        ${app.status === 'offer'        ? 'selected' : ''}>Offer</option>
            <option value="rejected"     ${app.status === 'rejected'     ? 'selected' : ''}>Rejected</option>
          </select>
        </td>
        <td class="date">${formatDate(app.applied_date)}</td>
      </tr>
    `).join('');
  }

  loadApplications();
</script>

</body>
</html>
