name: Build and Push Docker Images

on:
  push:
    branches:
      - feature/kubernetes
    paths:
      - 'services/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      parser: ${{ steps.filter.outputs.parser }}
      gmail-poller: ${{ steps.filter.outputs.gmail-poller }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed services
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'services/api/**'
            parser:
              - 'services/parser/**'
            gmail-poller:
              - 'services/gmail-poller/**'
            frontend:
              - 'services/frontend/**'

  build-api:
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./services/api
          push: true
          tags: |
            iusmanq/inboxhire-api:latest
            iusmanq/inboxhire-api:v1.0.${{ github.run_number }}

  build-parser:
    needs: detect-changes
    if: needs.detect-changes.outputs.parser == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Parser image
        uses: docker/build-push-action@v5
        with:
          context: ./services/parser
          push: true
          tags: |
            iusmanq/inboxhire-parser:latest
            iusmanq/inboxhire-parser:v1.0.${{ github.run_number }}

  build-gmail-poller:
    needs: detect-changes
    if: needs.detect-changes.outputs.gmail-poller == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Gmail Poller image
        uses: docker/build-push-action@v5
        with:
          context: ./services/gmail-poller
          push: true
          tags: |
            iusmanq/inboxhire-gmail-poller:latest
            iusmanq/inboxhire-gmail-poller:v1.0.${{ github.run_number }}

  build-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./services/frontend
          push: true
          tags: |
            iusmanq/inboxhire-frontend:latest
            iusmanq/inboxhire-frontend:v1.0.${{ github.run_number }}
