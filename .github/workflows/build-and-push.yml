name: Build, Push, and Deploy

on:
  push:
    branches:
      - feature/kubernetes
    paths:
      - 'services/**'
      - 'k8s/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      parser: ${{ steps.filter.outputs.parser }}
      gmail-poller: ${{ steps.filter.outputs.gmail-poller }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed services
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'services/api/**'
            parser:
              - 'services/parser/**'
            gmail-poller:
              - 'services/gmail-poller/**'
            frontend:
              - 'services/frontend/**'

  build-api:
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./services/api
          push: true
          platforms: linux/amd64
          tags: |
            iusmanq/inboxhire-api:latest
            iusmanq/inboxhire-api:v1.0.${{ github.run_number }}

  build-parser:
    needs: detect-changes
    if: needs.detect-changes.outputs.parser == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Parser image
        uses: docker/build-push-action@v5
        with:
          context: ./services/parser
          push: true
          platforms: linux/amd64
          tags: |
            iusmanq/inboxhire-parser:latest
            iusmanq/inboxhire-parser:v1.0.${{ github.run_number }}

  build-gmail-poller:
    needs: detect-changes
    if: needs.detect-changes.outputs.gmail-poller == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Gmail Poller image
        uses: docker/build-push-action@v5
        with:
          context: ./services/gmail-poller
          push: true
          platforms: linux/amd64
          tags: |
            iusmanq/inboxhire-gmail-poller:latest
            iusmanq/inboxhire-gmail-poller:v1.0.${{ github.run_number }}

  build-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./services/frontend
          push: true
          platforms: linux/amd64
          tags: |
            iusmanq/inboxhire-frontend:latest
            iusmanq/inboxhire-frontend:v1.0.${{ github.run_number }}

  deploy:
    runs-on: ubuntu-latest
    needs: [build-api, build-parser, build-gmail-poller, build-frontend]
    # Run deploy even if some build jobs were skipped (no changes to that service)
    if: always() && !failure() && !cancelled()
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_EKS }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/database/pvc.yaml
          kubectl apply -f k8s/database/deployment.yaml
          kubectl apply -f k8s/database/service.yaml
          kubectl apply -f k8s/parser/deployment.yaml
          kubectl apply -f k8s/parser/service.yaml
          kubectl apply -f k8s/api/deployment.yaml
          kubectl apply -f k8s/api/service.yaml
          kubectl apply -f k8s/gmail-poller/deployment.yaml
          kubectl apply -f k8s/frontend/deployment.yaml
          kubectl apply -f k8s/frontend/service.yaml
          kubectl apply -f k8s/ingress-eks.yaml

      - name: Restart deployments to pull latest images
        run: |
          kubectl rollout restart deployment/api -n inboxhire
          kubectl rollout restart deployment/parser -n inboxhire
          kubectl rollout restart deployment/gmail-poller -n inboxhire
          kubectl rollout restart deployment/frontend -n inboxhire

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/api -n inboxhire --timeout=120s
          kubectl rollout status deployment/parser -n inboxhire --timeout=120s
          kubectl rollout status deployment/frontend -n inboxhire --timeout=120s
