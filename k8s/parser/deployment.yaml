apiVersion: apps/v1
kind: Deployment
metadata:
  name: parser
  namespace: inboxhire
spec:
  replicas: 2
  selector:
    matchLabels:
      app: parser
  template:
    metadata:
      labels:
        app: parser
    spec:
      containers:
        - name: parser
          image: iusmanq/inboxhire-parser:latest
          ports:
            - containerPort: 3001
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: inboxhire-secret
                  key: ANTHROPIC_API_KEY
